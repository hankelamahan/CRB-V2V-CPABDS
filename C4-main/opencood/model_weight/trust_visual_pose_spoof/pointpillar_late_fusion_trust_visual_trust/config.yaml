data_augment:
- ALONG_AXIS_LIST:
  - x
  NAME: random_world_flip
- NAME: random_world_rotation
  WORLD_ROT_ANGLE:
  - -0.78539816
  - 0.78539816
- NAME: random_world_scaling
  WORLD_SCALE_RANGE:
  - 0.95
  - 1.05
fusion:
  args: []
  core_method: LateFusionDataset
train_params:
    max_cav: 10
trust_fusion:
  use_trust_fusion: true
  mode: trust_nms
  consistency_mode: leave_one_out
  min_reference_agents: 1
  min_matched_boxes: 1
  iou_thr: 0.6
  skip_box_thr: 1.0e-4
  update_rate: 0.1
  default_reputation: 1.0
  min_reputation: 0.0
  max_reputation: 1.0
  drop_below: 0.8
  score_power: 3.0
  ego_reputation: 1.0
  reputation_map: ""
  reputation_source:
    type: none
    path: ""
    vehicle_id_column: vehicle_id
    reputation_column: reputation
  id_map: ""
  log_reputation: true
  log_dir: "/home/wcp/c4/Results/trust_visual_pose_spoof/trust_pose_spoof/trust_logs"
reputation_update:
  positive_rate: 0.04
  negative_rate: 0.80
  unknown_rate: 0.0
  good_thr: 0.90
  bad_thr: 0.05
  max_per_frame_delta: 0.4
physical_consistency:
  use_physical_consistency: true
  frame_interval: 0.05
  residual_sigma: 3.0
  velocity_sigma: 8.0
  max_valid_speed: 35.0
  history_window: 5
  weights:
    voting: 0.45
    motion: 0.1
    consensus_motion: 0.50
track_association:
  max_center_distance: 4.0
  min_bev_iou: 0.1
  max_age: 3
loss:
  args:
    cls_weight: 1.0
    reg: 2.0
  core_method: point_pillar_loss
lr_scheduler:
  core_method: multistep
  gamma: 0.1
  step_size:
  - 15
  - 30
model:
  args:
    anchor_num: 2
    anchor_number: 2
    backbone_3d: []
    base_bev_backbone:
      layer_nums:
      - 5
      - 5
      layer_strides:
      - 1
      - 2
      num_filters:
      - 128
      - 256
      num_upsample_filter:
      - 256
      - 256
      upsample_strides:
      - 1
      - 2
    batch_size: 1
    grid_size: !!python/object/apply:numpy.core.multiarray._reconstruct
      args:
      - !!python/name:numpy.ndarray ''
      - !!python/tuple
        - 0
      - !!binary |
        Yg==
      state: !!python/tuple
      - 1
      - !!python/tuple
        - 3
      - !!python/object/apply:numpy.dtype
        args:
        - i8
        - false
        - true
        state: !!python/tuple
        - 3
        - <
        - null
        - null
        - null
        - -1
        - -1
        - 0
      - false
      - !!binary |
        gAUAAAAAAAAgAwAAAAAAACgAAAAAAAAA
    height_compression:
      feature_num: 256
    lidar_range: &id001
    - -70.4
    - -40
    - -3
    - 70.4
    - 40
    - 1
    mean_vfe:
      feature_points: 4
    voxel_size: &id002
    - 0.1
    - 0.1
    - 0.1
  core_method: second
name: second_late_fusion_trust_visual_trust
optimizer:
  args:
    eps: 1.0e-10
    weight_decay: 0.0001
  core_method: Adam
  lr: 0.002
postprocess:
  anchor_args:
    D: 40
    H: 800
    W: 1408
    cav_lidar_range: *id001
    feature_stride: 8
    h: 1.56
    l: 3.9
    num: 2
    r:
    - 0
    - 90
    vd: 0.1
    vh: 0.1
    vw: 0.1
    w: 1.6
  core_method: VoxelPostprocessor
  max_num: 50
  nms_thresh: 0.15
  order: hwl
  target_args:
    neg_threshold: 0.45
    pos_threshold: 0.6
    score_threshold: 0.35
preprocess:
  args:
    max_points_per_voxel: 5
    max_voxel_test: 40000
    max_voxel_train: 16000
    voxel_size: *id002
  cav_lidar_range: *id001
  core_method: SpVoxelPreprocessor
root_dir: "/home/wcp/c4/Dataset/trust_visual_pose_spoof/episode_0000"
validate_dir: "/home/wcp/c4/Dataset/trust_visual_pose_spoof/episode_0000"
yaml_parser: load_second_params
wild_setting:
  seed: 20
  async: false
  async_overhead: 300
  loc_err: false
  xyz_std: 0.1
  ryp_std: 0.2
