data_augment:
- ALONG_AXIS_LIST:
  - x
  NAME: random_world_flip
- NAME: random_world_rotation
  WORLD_ROT_ANGLE:
  - -0.78539816
  - 0.78539816
- NAME: random_world_scaling
  WORLD_SCALE_RANGE:
  - 0.95
  - 1.05
fusion:
  args: []
  core_method: LateFusionDataset
trust_fusion:
  use_trust_fusion: true
  mode: trust_nms
  consistency_mode: leave_one_out
  min_reference_agents: 1
  min_matched_boxes: 1
  iou_thr: 0.5
  skip_box_thr: 1.0e-4
  update_rate: 0.1
  default_reputation: 0.5
  min_reputation: 0.0
  max_reputation: 1.0
  drop_below: 0.5
  score_power: 1.0
  ego_reputation: 1.0
  reputation_map: ""
  reputation_source:
    type: none
    path: ""
    vehicle_id_column: vehicle_id
    reputation_column: reputation
  id_map: ""
  log_reputation: true
  log_dir: "logs/trust/test4_Physcial"
reputation_update:
  positive_rate: 0.10
  negative_rate: 0.10
  unknown_rate: 0.0
  good_thr: 0.7
  bad_thr: 0.4
  max_per_frame_delta: 0.10
physical_consistency:
  use_physical_consistency: true
  frame_interval: 0.05
  residual_sigma: 5.0
  velocity_sigma: 10.0
  max_valid_speed: 40.0
  history_window: 5
  weights:
    voting: 0.4
    motion: 0.3
    consensus_motion: 0.3
track_association:
  max_center_distance: 4.0
  min_bev_iou: 0.1
  max_age: 3
loss:
  args:
    cls_weight: 1.0
    reg: 2.0
  core_method: point_pillar_loss
lr_scheduler:
  core_method: multistep
  gamma: 0.1
  step_size:
  - 35
  - 55
model:
  args:
    anchor_num: 2
    anchor_number: 2
    base_bev_backbone:
      layer_nums:
      - 3
      - 5
      - 8
      layer_strides:
      - 2
      - 2
      - 2
      num_filters:
      - 64
      - 128
      - 256
      num_upsample_filter:
      - 128
      - 128
      - 128
      upsample_strides:
      - 1
      - 2
      - 4
    lidar_range: &id001
    - -70.4
    - -40
    - -3
    - 70.4
    - 40
    - 1
    pillar_vfe:
      num_filters:
      - 64
      use_absolute_xyz: true
      use_norm: true
      with_distance: false
    point_pillar_scatter:
      grid_size: !!python/object/apply:numpy.core.multiarray._reconstruct
        args:
        - !!python/name:numpy.ndarray ''
        - !!python/tuple
          - 0
        - !!binary |
          Yg==
        state: !!python/tuple
        - 1
        - !!python/tuple
          - 3
        - !!python/object/apply:numpy.dtype
          args:
          - i8
          - false
          - true
          state: !!python/tuple
          - 3
          - <
          - null
          - null
          - null
          - -1
          - -1
          - 0
        - false
        - !!binary |
          YAEAAAAAAADIAAAAAAAAAAEAAAAAAAAA
      num_features: 64
    voxel_size: &id002
    - 0.4
    - 0.4
    - 4
  core_method: point_pillar
name: pointpillar_late_fusion_runtime_v2xset
optimizer:
  args:
    eps: 1.0e-10
    weight_decay: 0.0001
  core_method: Adam
  lr: 0.002
postprocess:
  anchor_args:
    D: 1
    H: 200
    W: 352
    cav_lidar_range: *id001
    h: 1.56
    l: 3.9
    num: 2
    r:
    - 0
    - 90
    vd: 4
    vh: 0.4
    vw: 0.4
    w: 1.6
  core_method: VoxelPostprocessor
  max_num: 100
  nms_thresh: 0.15
  order: hwl
  target_args:
    neg_threshold: 0.45
    pos_threshold: 0.6
    score_threshold: 0.20
preprocess:
  args:
    max_points_per_voxel: 32
    max_voxel_test: 40000
    max_voxel_train: 16000
    voxel_size: *id002
  cav_lidar_range: *id001
  core_method: SpVoxelPreprocessor
root_dir: "v2xset/validate"
validate_dir: "v2xset/validate"
yaml_parser: load_point_pillar_params
wild_setting:
  seed: 20
  async: false
  async_overhead: 300
  loc_err: true
  xyz_std: 0.1
  ryp_std: 0.2
