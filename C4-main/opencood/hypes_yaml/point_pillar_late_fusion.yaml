name: point_pillar_late_fusion
root_dir: "opv2v_data_dumping/train"
validate_dir: "opv2v_data_dumping/validate"

yaml_parser: "load_point_pillar_params"
train_params:
  batch_size: &batch_size 2
  epoches: 15
  eval_freq: 1
  save_freq: 1

fusion:
  core_method: 'LateFusionDataset' # LateFusionDataset, EarlyFusionDataset, IntermediateFusionDataset supported
  args: []

trust_fusion:
  use_trust_fusion: false
  mode: trust_nms
  consistency_mode: leave_one_out
  min_reference_agents: 1
  min_matched_boxes: 1
  iou_thr: 0.5
  skip_box_thr: 1.0e-4
  update_rate: 0.1
  default_reputation: 0.5
  min_reputation: 0.0
  max_reputation: 1.0
  drop_below: 0.3
  score_power: 1.0
  ego_reputation: 1.0
  reputation_map: ""
  reputation_source:
    type: none
    path: ""
    vehicle_id_column: vehicle_id
    reputation_column: reputation
  id_map: ""
  log_reputation: false
  log_dir: ""

reputation_update:
  positive_rate: 0.03
  negative_rate: 0.10
  unknown_rate: 0.0
  good_thr: 0.7
  bad_thr: 0.4
  max_per_frame_delta: 0.10

physical_consistency:
  use_physical_consistency: false
  frame_interval: 0.1
  residual_sigma: 5.0
  velocity_sigma: 3.0
  max_valid_speed: 40.0
  history_window: 5
  weights:
    voting: 0.4
    motion: 0.3
    consensus_motion: 0.3

track_association:
  max_center_distance: 4.0
  min_bev_iou: 0.1
  max_age: 3

# preprocess-related
preprocess:
  # options: BasePreprocessor, VoxelPreprocessor, BevPreprocessor
  core_method: 'SpVoxelPreprocessor'
  args:
    voxel_size: &voxel_size [0.4, 0.4, 4]
    max_points_per_voxel: 32
    max_voxel_train: 16000
    max_voxel_test: 40000
  # lidar range for each individual cav.
  cav_lidar_range: &cav_lidar [-70.4, -40, -3, 70.4, 40, 1]

data_augment:
  - NAME: random_world_flip
    ALONG_AXIS_LIST: [ 'x' ]

  - NAME: random_world_rotation
    WORLD_ROT_ANGLE: [ -0.78539816, 0.78539816 ]

  - NAME: random_world_scaling
    WORLD_SCALE_RANGE: [ 0.95, 1.05 ]

# anchor box related
postprocess:
  core_method: 'VoxelPostprocessor' # VoxelPostprocessor, BevPostprocessor supported
  anchor_args:
    cav_lidar_range: *cav_lidar
    l: 3.9
    w: 1.6
    h: 1.56
    r: [0, 90]
    num: &achor_num 2
  target_args:
    pos_threshold: 0.6
    neg_threshold: 0.45
    score_threshold: 0.20
  order: 'hwl' # hwl or lwh
  max_num: 100 # maximum number of objects in a single frame. use this number to make sure different frames has the same dimension in the same batch
  nms_thresh: 0.15

# model related
model:
  core_method: point_pillar
  args:
    voxel_size: *voxel_size
    lidar_range: *cav_lidar
    anchor_number: *achor_num
    pillar_vfe:
      use_norm: true
      with_distance: false
      use_absolute_xyz: true
      num_filters: [64]
    point_pillar_scatter:
      num_features: 64

    base_bev_backbone:
      layer_nums: [3, 5, 8]
      layer_strides: [2, 2, 2]
      num_filters: [64, 128, 256]
      upsample_strides: [1, 2, 4]
      num_upsample_filter: [128, 128, 128]

    anchor_num: *achor_num

loss:
  core_method: point_pillar_loss
  args:
    cls_weight: 1.0
    reg: 2.0

optimizer:
  core_method: Adam
  lr: 0.002
  args:
    eps: 1e-10
    weight_decay: 1e-4

lr_scheduler:
  core_method: multistep #step, multistep and Exponential support
  gamma: 0.1
  step_size: [10, 15]
